name: Sync Notion → tasks.md

on:
  schedule:
    # Runs every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch: # Allow manual trigger from Actions UI

jobs:
  pull-from-notion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use a PAT so the push later can trigger other workflows if needed
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Pull Notion → tasks.md
        id: pull
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        # Exit code 42 means "file changed and needs committing"
        run: |
          python scripts/sync_notion.py pull
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit and push if changed
        if: steps.pull.outputs.exit_code == '42'
        run: |
          git config user.name  "notion-sync[bot]"
          git config user.email "notion-sync[bot]@users.noreply.github.com"
          git add tasks.md
          git commit -m "[notion-sync] Sync tasks from Notion $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push