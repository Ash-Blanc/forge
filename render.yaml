  # Next.js Frontend
  - type: web
    name: forge-app
    runtime: node
    buildCommand: cd forge-app && npm install -g bun && bun install && bun run build
    startCommand: cd forge-app && bun run start
    envVars:
      - key: NODE_ENV
        value: production
      # -------------------------------------------------------------
      # The line below handles dynamic connection to the backend!
      # Uncomment 'fromService' and remove 'value' to link it automatically 
      # once the forge-agents service is uncommented above.
      # -------------------------------------------------------------
      - key: AGNO_BASE_URL
        value: "http://127.0.0.1:8321"
